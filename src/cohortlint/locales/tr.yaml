TEST001:
  title: "Test bulgusu"
  detail: "{name} için test ayrıntısı"
  suggestion: "Test girdisini gözden geçirin."
S001:
  title: "Örnek tanımlayıcı bütünlüğü"
  detail: "'{sample_id}' örnek tanımlayıcısında eksik, boş veya yinelenen değerler var."
  suggestion: "Her satır için mevcut, boş olmayan ve benzersiz bir örnek tanımlayıcı sağlayın."
S002:
  title: "Olası gözlem düzeyi karışması"
  detail: "Satır/örnek oranı {ratio}; bu tablo örnek düzeyi yerine hücre düzeyi metadata olabilir."
  suggestion: "Entegrasyondan önce amaçlanan gözlem düzeyini doğrulayın."
S003:
  title: "Kohortlar arası şema kayması"
  detail: "Şema kayması '{column}' sütununu ve şu kohortları etkiliyor: {cohorts}."
  suggestion: "Kohort sütunlarını hedef şemayla hizalayın veya bilinçli ek sütunları tanımlayın."
S004:
  title: "Veri tipi uyuşmazlığı"
  detail: "'{column}' sütunu {numeric_cohorts} içinde sayısal, {non_numeric_cohorts} içinde sayısal değil."
  suggestion: "Bildirilen engelleyici değerleri düzeltin veya tanımlanan şema tipini güncelleyin."
U001:
  title: "Sayısal birim kayması"
  detail: "'{column}' sütununda uyumsuz kohort medyanları veya çıkarılan birimler var; tanımlı birim: {declared_unit}."
  suggestion: "Kaynak birimleri doğrulayın ve entegrasyondan önce tek bir tanımlı birime dönüştürün."
U002:
  title: "Kategorik kodlama kayması"
  detail: "'{column}' sütununda izin verilen değerler ve eşanlamlılar dışında değerler var."
  suggestion: "Önerilen eşlemeleri inceleyin ve kabul edilen yazımları config dosyasına ekleyin."
U003:
  title: "Ondalık ayırıcı artefaktı"
  detail: "'{column}' sütunundaki dolu değerlerin {fraction} kadarı ondalık virgül kullanıyor."
  suggestion: "Ondalık virgülleri harmonize komutuyla ondalık noktaya dönüştürün."
U004:
  title: "Ölçek uyuşmazlığı"
  detail: "'{column}' sütununun yayılımı, kohortlar arasında yapılandırılan büyüklük mertebesinden fazla değişiyor."
  suggestion: "Log dönüşümlü ve doğrusal değerlerin karışıp karışmadığını kontrol edin."
U005:
  title: "Aralık dışı değerler"
  detail: "'{column}' sütununda tanımlı aralığın dışında {count} değer var."
  suggestion: "Uç değerleri kaynaktan doğrulayın ve yalnızca doğrulanmış hataları düzeltin."
C001:
  title: "Gerekli kovaryat yok"
  detail: "Gerekli '{column}' kovaryatı bu kohortta yok."
  suggestion: "Kovaryatı sağlayın veya hedef şemayı açıkça güncelleyin."
C002:
  title: "Yüksek eksiklik oranı"
  detail: "'{column}' sütunundaki değerlerin {fraction} kadarı eksik."
  suggestion: "Entegrasyonun geçerliliğini değerlendirin ve imputasyon kararlarını belgeleyin."
C003:
  title: "Diferansiyel eksiklik"
  detail: "'{column}' eksikliği düzeltme sonrasında '{biological}' ile ilişkili (q={q_value})."
  suggestion: "Tam vakaların yanlılıksız olduğunu varsaymayın; eksiklik mekanizmasını inceleyin."
D001:
  title: "Batch-koşul ilişkisi"
  detail: "'{biological}' ile '{technical}' arasındaki ilişkinin yanlılık-düzeltilmiş Cramér's V değeri {v}."
  suggestion: "Kontenjans tablosunu inceleyin ve batch ile ilişkili etkileri biyolojik etki olarak yorumlamayın."
D002:
  title: "Tam veya düzeye özgü konfunding"
  detail: "'{biological}' değişkeninin '{level}' düzeyi '{technical}' değişkeninden ayrılamıyor."
  suggestion: "Bu hesaplamayla onarılamaz; örtüşen bir alt kümeye inin veya konfundingi kıran yeni örnekler edinin."
D003:
  title: "Rank eksik tasarım matrisi"
  detail: "Tasarım tahmin edilebilir değil; bağımlı sütunlar: {dependent}."
  suggestion: "Fazlalık kovaryatları kaldırın veya aşağı akış analizinden önce karşılaştırmayı yeniden tasarlayın."
D004:
  title: "Kovaryatlar arası multicollinearity"
  detail: "Sayısal '{column}' kovaryatının VIF değeri {vif}."
  suggestion: "Fazlalık kovaryatları inceleyip bilimsel olarak gerekçeli, tahmin edilebilir bir model kullanın."
D005:
  title: "Grup büyüklüğü dengesizliği"
  detail: "'{biological}' ve '{technical}' çaprazlamasında küçük hücreler veya yetersiz biyolojik düzeyler var."
  suggestion: "Örnek ekleyin veya çıkarımları yeterince temsil edilen karşılaştırmalarla sınırlayın."
D006:
  title: "Entegre edilebilirlik skoru"
  detail: "Entegre edilebilirlik skoru {score}/100. Bu bir iletişim sezgisidir, istatistik değildir."
  suggestion: "Entegrasyon kararını yalnızca bu skora değil, tek tek bulgulara dayandırın."
