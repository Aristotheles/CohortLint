TEST001:
  title: "Testbefund"
  detail: "Testdetail für {name}"
  suggestion: "Prüfen Sie die Testeingabe."
REPORT:
  title: "CohortLint-Bericht"
  heuristic: "Dieser Wert ist eine Kommunikationsheuristik, keine Statistik."
  evidence: "Evidenz"
S001:
  title: "Integrität der Stichprobenkennung"
  detail: "Die Stichprobenkennung '{sample_id}' enthält fehlende, leere oder doppelte Werte."
  suggestion: "Geben Sie für jede Zeile eine vorhandene, nicht leere und eindeutige Stichprobenkennung an."
S002:
  title: "Mögliche Vermischung der Beobachtungsebenen"
  detail: "Das Verhältnis von Zeilen zu Stichproben beträgt {ratio}; möglicherweise liegen Zell- statt Stichprobenmetadaten vor."
  suggestion: "Bestätigen Sie vor der Integration die beabsichtigte Beobachtungsebene."
S003:
  title: "Schemaabweichung zwischen Kohorten"
  detail: "Die Schemaabweichung betrifft die Spalte '{column}' und folgende Kohorten: {cohorts}."
  suggestion: "Gleichen Sie die Kohortenspalten an das Zielschema an oder deklarieren Sie beabsichtigte Zusatzspalten."
S004:
  title: "Abweichende Datentypen"
  detail: "Die Spalte '{column}' ist in {numeric_cohorts} numerisch, in {non_numeric_cohorts} jedoch nicht numerisch."
  suggestion: "Korrigieren Sie die gemeldeten blockierenden Werte oder ändern Sie den deklarierten Schematyp."
U001:
  title: "Abweichende numerische Einheiten"
  detail: "Die Spalte '{column}' weist inkompatible Kohortenmediane oder abgeleitete Einheiten auf; deklarierte Einheit: {declared_unit}."
  suggestion: "Prüfen Sie die Quelleinheiten und konvertieren Sie vor der Integration in eine gemeinsame Einheit."
U002:
  title: "Abweichende kategoriale Kodierung"
  detail: "Die Spalte '{column}' enthält Werte außerhalb der erlaubten Werte und Synonyme."
  suggestion: "Prüfen Sie die vorgeschlagenen Zuordnungen und ergänzen Sie akzeptierte Schreibweisen in der Konfiguration."
U003:
  title: "Artefakt durch Dezimaltrennzeichen"
  detail: "In der Spalte '{column}' verwenden {fraction} der vorhandenen Werte ein Dezimalkomma."
  suggestion: "Konvertieren Sie Dezimalkommas mit dem Befehl harmonize in Dezimalpunkte."
U004:
  title: "Abweichende Skalierung"
  detail: "Die Streuung der Spalte '{column}' unterscheidet sich um mehr als die konfigurierte Größenordnung."
  suggestion: "Prüfen Sie, ob logarithmisch transformierte und lineare Werte vermischt wurden."
U005:
  title: "Werte außerhalb des Bereichs"
  detail: "Die Spalte '{column}' enthält {count} Werte außerhalb des deklarierten Bereichs."
  suggestion: "Prüfen Sie Extremwerte anhand der Quelle und korrigieren Sie nur bestätigte Fehler."
C001:
  title: "Erforderliche Kovariate fehlt"
  detail: "Die erforderliche Kovariate '{column}' fehlt in dieser Kohorte."
  suggestion: "Stellen Sie die Kovariate bereit oder ändern Sie das Zielschema ausdrücklich."
C002:
  title: "Hoher Anteil fehlender Werte"
  detail: "In der Spalte '{column}' fehlen {fraction} der Werte."
  suggestion: "Bewerten Sie die Gültigkeit der Integration und dokumentieren Sie jede Imputationsentscheidung."
C003:
  title: "Differentielle Fehlwerte"
  detail: "Fehlwerte in '{column}' sind nach Korrektur mit '{biological}' assoziiert (q={q_value})."
  suggestion: "Nehmen Sie nicht an, dass vollständige Fälle unverzerrt sind; prüfen Sie den Fehlwertmechanismus."
D001:
  title: "Assoziation zwischen Batch und Bedingung"
  detail: "Die Assoziation zwischen '{biological}' und '{technical}' hat ein bias-korrigiertes Cramér's V={v}."
  suggestion: "Prüfen Sie die Kontingenztabelle und interpretieren Sie Batch-assoziierte Effekte nicht als biologisch."
D002:
  title: "Vollständige oder stufenspezifische Konfundierung"
  detail: "Die Stufe '{level}' von '{biological}' kann nicht von '{technical}' getrennt werden."
  suggestion: "Dies ist rechnerisch nicht reparierbar; beschränken Sie die Analyse auf überlappende Daten oder erheben Sie zusätzliche Stichproben."
D003:
  title: "Rangdefiziente Designmatrix"
  detail: "Das Design ist nicht schätzbar; abhängige Spalten: {dependent}."
  suggestion: "Entfernen Sie redundante Kovariaten oder ändern Sie den Vergleich vor der weiteren Analyse."
D004:
  title: "Multikollinearität zwischen Kovariaten"
  detail: "Die numerische Kovariate '{column}' hat VIF={vif}."
  suggestion: "Prüfen Sie redundante Kovariaten und verwenden Sie ein wissenschaftlich begründetes, schätzbares Modell."
D005:
  title: "Unausgewogene Gruppengrößen"
  detail: "'{biological}' nach '{technical}' enthält kleine Zellen oder zu kleine biologische Stufen."
  suggestion: "Ergänzen Sie Stichproben oder beschränken Sie Aussagen auf ausreichend repräsentierte Vergleiche."
D006:
  title: "Integrationsfähigkeit"
  detail: "Der Integrationswert beträgt {score}/100. Er ist eine Kommunikationsheuristik, keine Statistik."
  suggestion: "Entscheiden Sie anhand der einzelnen Befunde und nicht allein anhand dieses Wertes."
V001:
  title: "Nicht zugeordnete Ontologiebegriffe"
  detail: "Die Ontologiespalte '{column}' enthält {count} nicht zugeordnete Begriffe oder die optionale Ontologieabhängigkeit fehlt."
  suggestion: "Installieren Sie cohortlint[ontology] und prüfen Sie Begriffe, statt unsichere Zuordnungen still anzuwenden."
V002:
  title: "Ontologiezuordnung mit geringer Konfidenz"
  detail: "Der Begriff '{term}' hat eine Zuordnungskonfidenz von {confidence}."
  suggestion: "Bestätigen Sie diese Zuordnung vor der Übernahme manuell."
V003:
  title: "Nahezu doppelte Ontologiebezeichnungen"
  detail: "In der Spalte '{column}' werden {count} Ontologiekonzepte durch mehrere Rohbezeichnungen dargestellt."
  suggestion: "Fassen Sie akzeptierte hochkonfidente Bezeichnungen mit harmonize und Provenienz zusammen."
P001:
  title: "Verbleibende direkte Identifikatoren"
  detail: "Die Spalte '{column}' enthält {count} Werte mit Mustern direkter Identifikatoren. Dies ist eine Heuristik, keine Compliance-Bewertung."
  suggestion: "Entfernen oder pseudonymisieren Sie Identifikatoren angemessen vor Weitergabe oder Integration."
P002:
  title: "Verletzung der k-Anonymität"
  detail: "{count} Quasi-Identifikatorgruppen sind kleiner als k={threshold}. Dies ist eine Heuristik, keine Compliance-Bewertung."
  suggestion: "Prüfen Sie die bestimmenden Spalten und vergröbern Sie Kategorien nur unter Wahrung des wissenschaftlichen Nutzens."
P003:
  title: "Übermäßige Datumsgenauigkeit"
  detail: "Die Spalte '{column}' enthält offenbar tagesgenaue Daten. Dies ist eine Heuristik, keine Compliance-Bewertung."
  suggestion: "Reduzieren Sie die Genauigkeit auf Monat oder Jahr, wenn exakte Daten wissenschaftlich nicht erforderlich sind."
