TEST001:
  title: "Test finding"
  detail: "Test detail for {name}"
  suggestion: "Review the test input."
S001:
  title: "Sample identifier integrity"
  detail: "Sample identifier '{sample_id}' has missing, null, or duplicate values."
  suggestion: "Provide a present, non-null, unique sample identifier for every row."
S002:
  title: "Possible observation-level mixing"
  detail: "The row-to-sample ratio is {ratio}; this may be cell-level rather than sample-level metadata."
  suggestion: "Confirm the intended observation level before integration."
S003:
  title: "Schema drift across cohorts"
  detail: "Schema drift affects column '{column}' and cohorts: {cohorts}."
  suggestion: "Align cohort columns with the target schema or declare intentional extra columns."
S004:
  title: "Type disagreement"
  detail: "Column '{column}' is numeric in {numeric_cohorts} but non-numeric in {non_numeric_cohorts}."
  suggestion: "Correct the reported blocking values or update the declared schema type."
U001:
  title: "Numeric unit drift"
  detail: "Column '{column}' has incompatible cohort medians or inferred units; declared unit: {declared_unit}."
  suggestion: "Confirm the source units and convert values to one declared unit before integration."
U002:
  title: "Categorical encoding drift"
  detail: "Column '{column}' contains values outside its allowed values and synonyms."
  suggestion: "Review the suggested mappings and add accepted spellings to the config."
U003:
  title: "Decimal separator artifact"
  detail: "In column '{column}', {fraction} of populated values use a decimal comma."
  suggestion: "Convert decimal commas to decimal points with the harmonize command."
U004:
  title: "Scale mismatch"
  detail: "Column '{column}' differs by more than the configured orders of magnitude in spread."
  suggestion: "Check whether cohorts use log-transformed and linear values."
U005:
  title: "Out-of-range values"
  detail: "Column '{column}' contains {count} values outside its declared range."
  suggestion: "Verify extreme values against the source and correct only confirmed errors."
C001:
  title: "Required covariate absent"
  detail: "Required covariate '{column}' is absent from this cohort."
  suggestion: "Provide the covariate or explicitly revise the target schema."
C002:
  title: "High missingness"
  detail: "Column '{column}' has {fraction} missing values."
  suggestion: "Assess whether integration remains valid and document any imputation decision."
C003:
  title: "Differential missingness"
  detail: "Missingness in '{column}' is associated with '{biological}' after correction (q={q_value})."
  suggestion: "Do not assume complete cases are unbiased; review the missingness mechanism."
D001:
  title: "Batch-condition association"
  detail: "Association between '{biological}' and '{technical}' has bias-corrected Cramér's V={v}."
  suggestion: "Inspect the contingency table and avoid interpreting batch-associated effects as biological."
D002:
  title: "Complete or level-specific confounding"
  detail: "Level '{level}' of '{biological}' cannot be separated from '{technical}'."
  suggestion: "This cannot be repaired computationally; restrict to an overlapping subset or obtain samples that break the confounding."
D003:
  title: "Rank-deficient design matrix"
  detail: "The design is not estimable; dependent columns: {dependent}."
  suggestion: "Remove redundant covariates or redesign the comparison before downstream analysis."
D004:
  title: "Multicollinearity among covariates"
  detail: "Numeric covariate '{column}' has VIF={vif}."
  suggestion: "Review redundant covariates and retain a scientifically justified estimable model."
D005:
  title: "Group size imbalance"
  detail: "'{biological}' by '{technical}' contains small cells or undersized biological levels."
  suggestion: "Add samples, combine only defensible groups, or limit claims to adequately represented comparisons."
D006:
  title: "Integrability score"
  detail: "The integrability score is {score}/100. This is a communication heuristic, not a statistic."
  suggestion: "Use the individual findings—not this score alone—to decide whether integration is defensible."
V001:
  title: "Unmapped ontology terms"
  detail: "Ontology column '{column}' has {count} unmapped terms, or the optional ontology dependency is unavailable."
  suggestion: "Install cohortlint[ontology] and review unmapped terms rather than applying guesses silently."
V002:
  title: "Low-confidence ontology mapping"
  detail: "Term '{term}' has mapping confidence {confidence}."
  suggestion: "Confirm this mapping manually before accepting it."
V003:
  title: "Near-duplicate ontology labels"
  detail: "Column '{column}' has {count} ontology concepts represented by multiple raw labels."
  suggestion: "Use harmonize to collapse accepted high-confidence labels with provenance."
